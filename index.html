<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ELO POLL</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="pageLoader" class="page-loader" aria-live="polite" aria-label="Loading content">
    <div class="loader-box">
      <span class="loader-spinner"></span>
      <p>Loading images...</p>
    </div>
  </div>

  <div class="page-shell">
    <div class="wrapper">
      <div class="title">
        <h1>ELO POLL</h1>
      </div>
      <div class="container">
        <h3>
          Were we let in for our looks? No. Will we be judged on them? Yes.
        </h3>
        <h2>Who's Hotter? Click to Choose.</h2>

        <div class="img-wrapper" aria-label="Choose between two images">
          <div class="choice-card" id="leftCard">
            <span class="choice-loader" aria-hidden="true"></span>
            <img src="" alt="Left Image" id="leftImg" class="choice-image" onclick="clickLeft()" decoding="async" />
          </div>

          <h3 class="or-char">OR</h3>

          <div class="choice-card" id="rightCard">
            <span class="choice-loader" aria-hidden="true"></span>
            <img src="" alt="Right Image" id="rightImg" class="choice-image" onclick="clickRight()" decoding="async" />
          </div>
        </div>

        <ul class="footer-list">
          <li><a href="ranking.html">Rankings</a></li>
        </ul>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>

</html>
